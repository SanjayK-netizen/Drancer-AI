<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Drancer‑AI Assistant</title>
    <style>
        body {
            margin: 0;
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #1e1e2f, #2a2a3b);
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 800px;
            margin: auto;
            width: 100%;
            padding: 1rem;
        }
        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 0.5rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            margin-bottom: 1rem;
            backdrop-filter: blur(8px);
        }
        .msg {
            margin: 0.5rem 0;
            line-height: 1.4;
        }
        .msg.user { text-align: right; }
        .msg.assistant { text-align: left; }
        .input-area {
            display: flex;
            gap: 0.5rem;
        }
        input[type="text"] {
            flex: 1;
            padding: 0.6rem;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
        }
        button {
            padding: 0.6rem 1rem;
            border: none;
            border-radius: 4px;
            background: #4a90e2;
            color: #fff;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover { background: #357ab8; }
        .spinner {
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-left: 0.5rem;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="messages" id="messages"></div>
        <div class="input-area">
            <input type="text" id="userInput" placeholder="Type your message..." autocomplete="off" />
            <button id="sendBtn">Send</button>
            <button id="pttBtn">Push to Talk</button>
            <div class="spinner hidden" id="spinner"></div>
        </div>
    </div>
    <script>
        const messagesDiv = document.getElementById('messages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const pttBtn = document.getElementById('pttBtn');
        const spinner = document.getElementById('spinner');
        function addMessage(text, role) {
            const msgEl = document.createElement('div');
            msgEl.className = `msg ${role}`;
            msgEl.textContent = text;
            messagesDiv.appendChild(msgEl);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        async function postJson(url, data) {
            spinner.classList.remove('hidden');
            try {
                const resp = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const json = await resp.json();
                return json;
            } finally {
                spinner.classList.add('hidden');
            }
        }
        sendBtn.addEventListener('click', async () => {
            const msg = userInput.value.trim();
            if (!msg) return;
            addMessage(msg, 'user');
            userInput.value = '';
            const result = await postJson('/ask', { message: msg });
            addMessage(result.response, 'assistant');
        });
        // Press Enter to send
        userInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendBtn.click();
        });
        // Push‑to‑Talk – triggers server‑side microphone capture
        pttBtn.addEventListener('click', async () => {
            addMessage('[Listening...]', 'user');
            const result = await postJson('/listen', {});
            // replace the placeholder message with actual transcript
            const lastMsg = messagesDiv.lastElementChild;
            if (lastMsg && lastMsg.textContent === '[Listening...]') {
                lastMsg.textContent = result.transcript;
            } else {
                addMessage(result.transcript, 'user');
            }
            addMessage(result.response, 'assistant');
        });
    </script>
</body>
</html>
